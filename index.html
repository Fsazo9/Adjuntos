  {const m={};df.filter(r=>r._durPlan!==null).forEach(r=>{if(!m[r.Etapa])m[r.Etapa]=[];m[r.Etapa].push(r._durPlan);});const entries=Object.entries(m).map(([k,v])=>[k,Math.round(v.reduce((a,b)=>a+b,0)/v.length),v.length]).sort((a,b)=>b[1]-a[1]);const el=document.getElementById('chEST1');if(!el)return;CI['chEST1']=new Chart(el,{type:'bar',data:{labels:entries.map(([k])=>k),datasets:[{label:'Dur.Prom.Plan(d)',data:entries.map(([,v])=>v),backgroundColor:CC.map(c=>c+'99'),borderRadius:5,borderSkipped:false},{label:'n ítems',data:entries.map(([,,n])=>n),type:'line',borderColor:'rgba(0,212,255,.6)',backgroundColor:'transparent',tension:.4,pointRadius:5,pointBackgroundColor:'rgba(0,212,255,.8)',yAxisID:'y2',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:9,padding:7,font:{size:10}}},datalabels:{display:ctx=>ctx.dataset.type!=='line'&&ctx.dataset.data[ctx.dataIndex]>0,color:'rgba(255,255,255,.85)',font:{weight:'700',size:9},formatter:v=>v+'d',anchor:'end',align:'top',offset:2}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{grid:{color:'rgba(255,255,255,.04)'},beginAtZero:true,ticks:{font:{size:9}},title:{display:true,text:'días',font:{size:9}}},y2:{position:'right',grid:{display:false},beginAtZero:true,ticks:{font:{size:9}},title:{display:true,text:'n',font:{size:9}}}}}});}
  // chEST2 grouped bar tipo
  {const tipoMap={};df.forEach(r=>{const t=r['Nombre Genérico']||r.Etapa||'Sin tipo';if(!tipoMap[t])tipoMap[t]={est:[],plan:[],real:[]};if(r['Plazo Est']!==null)tipoMap[t].est.push(r['Plazo Est']);if(r._durPlan!==null)tipoMap[t].plan.push(r._durPlan);if(r._durReal!==null)tipoMap[t].real.push(r._durReal);});const entries=Object.entries(tipoMap).filter(([,v])=>v.plan.length>=2).map(([k,v])=>{const a=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;return[k,a(v.est),a(v.plan),a(v.real)];}).sort((a,b)=>(b[2]||0)-(a[2]||0)).slice(0,10);const el=document.getElementById('chEST2');if(!el)return;CI['chEST2']=new Chart(el,{type:'bar',data:{labels:entries.map(([k])=>k.length>20?k.slice(0,20)+'…':k),datasets:[{label:'Estándar',data:entries.map(([,e])=>e),backgroundColor:'rgba(245,158,11,.55)',borderRadius:3,borderSkipped:false},{label:'Planificado',data:entries.map(([,,p])=>p),backgroundColor:'rgba(0,212,255,.55)',borderRadius:3,borderSkipped:false},{label:'Real',data:entries.map(([,,,r])=>r),backgroundColor:'rgba(239,68,68,.55)',borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:9,padding:7,font:{size:10}}},datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'rgba(255,255,255,.85)',font:{weight:'700',size:8},formatter:v=>v+'d',anchor:'end',align:'top',offset:1}},scales:{x:{grid:{display:false},ticks:{font:{size:8}}},y:{grid:{color:'rgba(255,255,255,.04)'},beginAtZero:true,ticks:{font:{size:9}},title:{display:true,text:'días',font:{size:9}}}}}});}
}

// ══════════════════════════════════════════
// TAB: VENCIMIENTOS (Timeline analysis)
// ══════════════════════════════════════════
function buildTL(df){
  const today=new Date();today.setHours(0,0,0,0);
  const meses=uq(df.filter(r=>r._mes!=='Sin Fecha').map(r=>r._mes));
  // Por mes: total, vencidos, urgentes, rc
  const mRows=meses.map(m=>{const items=df.filter(r=>r._mes===m);const venc=items.filter(r=>r._ef==='Vencido').length;const urg=items.filter(r=>r._ef==='Urgente (≤7d)').length;const aT=items.filter(r=>r._ef==='A tiempo').length;const isCrit=r=>r['Ruta Crítica']==='Sí'||r['Ruta Crítica']==='Si';const rc=items.filter(isCrit).length;const d=new Date(m+'-15');const lbl=d.toLocaleString('es-CL',{month:'long',year:'numeric'});return[m,lbl,items.length,venc,urg,aT,rc,items.length-venc-urg-aT];}).sort((a,b)=>a[0].localeCompare(b[0]));
  // Por trimestre
  const trims=uq(df.filter(r=>r._trim!=='Sin Fecha').map(r=>r._trim));
  const tRows=trims.map(t=>{const items=df.filter(r=>r._trim===t);const venc=items.filter(r=>r._ef==='Vencido').length;return[t,items.length,venc,pct(venc,items.length)+'%'];}).sort((a,b)=>a[0].localeCompare(b[0]));
  // Próximos 30 días — detalle
  const prox=df.filter(r=>r._finP&&r._diasHoy!==null&&r._diasHoy>=0&&r._diasHoy<=30).sort((a,b)=>a._diasHoy-b._diasHoy);
  const isCrit=r=>r['Ruta Crítica']==='Sí'||r['Ruta Crítica']==='Si';
  return`<div class="dash-grid">
    <div class="dc c12"><h3><span class="dot" style="background:var(--accent)"></span>Carga de Vencimientos por Mes (barras apiladas por estado)</h3><div class="cw h260"><canvas id="chTL1"></canvas></div></div>
    <div class="dc c6"><h3><span class="dot" style="background:var(--warn)"></span>Vencimientos Próximos 30 días — ${prox.length} ítems</h3><div style="max-height:300px;overflow-y:auto;">${prox.map(r=>`<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.72rem;"><div style="width:36px;font-family:var(--mono);font-size:.68rem;color:${r._diasHoy<=7?'var(--warn)':'var(--accent)'};">${r._diasHoy}d</div><div style="flex:1;overflow:hidden;"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.Ítem)}</div><div style="color:var(--text3);font-size:.65rem;">${esc(r.Proyecto)} · ${esc(r.Responsable)}</div></div>${isCrit(r)?'<span style="font-size:.6rem;background:rgba(239,68,68,.2);color:#fca5a5;border-radius:3px;padding:.05rem .3rem;">RC</span>':''}</div>`).join('')||'<div style="color:var(--text3);font-size:.75rem;padding:1rem;text-align:center;">Sin vencimientos en 30 días</div>'}</div></div>
    <div class="dc c6"><h3><span class="dot" style="background:var(--red)"></span>Vencidos — ${df.filter(r=>r._ef==='Vencido').length} ítems</h3><div style="max-height:300px;overflow-y:auto;">${df.filter(r=>r._ef==='Vencido').sort((a,b)=>a._diasHoy-b._diasHoy).map(r=>`<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.72rem;"><div style="width:44px;font-family:var(--mono);font-size:.68rem;color:var(--red);">${r._diasHoy}d</div><div style="flex:1;overflow:hidden;"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.Ítem)}</div><div style="color:var(--text3);font-size:.65rem;">${esc(r.Proyecto)} · ${esc(r.Responsable)}</div></div>${isCrit(r)?'<span style="font-size:.6rem;background:rgba(239,68,68,.2);color:#fca5a5;border-radius:3px;padding:.05rem .3rem;">RC</span>':''}</div>`).join('')||'<div style="color:var(--ok);font-size:.75rem;padding:1rem;text-align:center;">✅ Sin vencidos</div>'}</div></div>
  </div>
  <div class="stitle">Vencimientos por Mes</div>
  ${mktbl('tlmes',['Mes','Período','Total','Vencidos','Urgentes','A tiempo','Ruta Crit.','Sin Fecha'],mRows,['','TOTAL',...[2,3,4,5,6,7].map(ci=>mRows.reduce((s,r)=>s+(typeof r[ci]==='number'?r[ci]:0),0))],{1:'left'},(v,ci,row)=>{if(ci===0)return 'na';if(ci===3&&v>0)return 'clate rv';if(ci===4&&v>0)return 'cwarn wv';if(ci===5)return 'contime';if(ci===2)return 'ctotal';return '';})}
  <div class="stitle">Resumen por Trimestre</div>
  ${mktbl('tltrim',['Trimestre','Total','Vencidos','% Vencidos'],tRows,null,{0:'left'},(v,ci)=>{if(ci===2&&typeof v==='number'&&v>0)return 'clate';if(ci===3){const n=parseInt(v);return n>30?'clate':n>15?'cwarn':'cearly';}return '';})}`;
}

function initTLCharts(df){
  Chart.defaults.plugins.datalabels={display:false};
  {const mes=uq(df.filter(r=>r._mes!=='Sin Fecha').map(r=>r._mes)).sort();const efs=['Vencido','Urgente (≤7d)','Próximo (≤30d)','A tiempo'];const clrs={'Vencido':'rgba(239,68,68,.75)','Urgente (≤7d)':'rgba(245,158,11,.75)','Próximo (≤30d)':'rgba(251,191,36,.6)','A tiempo':'rgba(34,197,94,.6)'};const el=document.getElementById('chTL1');if(!el)return;CI['chTL1']=new Chart(el,{type:'bar',data:{labels:mes.map(m=>{const d=new Date(m+'-15');return d.toLocaleString('es-CL',{month:'short',year:'2-digit'});}),datasets:efs.map(ef=>({label:ef,data:mes.map(m=>df.filter(r=>r._mes===m&&r._ef===ef).length),backgroundColor:clrs[ef],borderRadius:3,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:9,padding:7,font:{size:10}}},datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'rgba(255,255,255,.9)',font:{weight:'700',size:9},formatter:v=>v,anchor:'center',align:'center',clamp:true}},scales:{x:{stacked:true,grid:{color:'rgba(255,255,255,.03)'},ticks:{font:{size:9}}},y:{stacked:true,grid:{color:'rgba(255,255,255,.03)'},beginAtZero:true,ticks:{font:{size:9}}}}}});}
}

// ══════════════════════════════════════════
// TAB: GANTT (mini)
// ══════════════════════════════════════════
function buildGantt(df){
  const withDates=df.filter(r=>r._inicioP&&r._finP).sort((a,b)=>a._inicioP-b._inicioP);
  if(!withDates.length)return`<div class="insight-box">Sin ítems con fechas de <strong>inicio y fin planificados</strong>. El Gantt requiere una columna de tipo Timeline con rango inicio-fin.</div>`;
  const today=new Date();today.setHours(0,0,0,0);
  const allDates=[...withDates.map(r=>r._inicioP),...withDates.map(r=>r._finP)];
  const minD=new Date(Math.min(...allDates));const maxD=new Date(Math.max(...allDates));
  const span=Math.max(1,(maxD-minD)/86400000);
  const todayPct=Math.min(100,Math.max(0,(today-minD)/86400000/span*100));
  const efClr={'Vencido':'#ef4444','Urgente (≤7d)':'#f59e0b','Próximo (≤30d)':'#fbbf24','A tiempo':'rgba(0,212,255,.7)','Sin Fecha':'#4a5568'};
  const avClr=r=>AVANCE_CLR[r.Avance]||'rgba(100,116,139,.5)';
  // Group by Proyecto, show top 80 by start date
  const top=withDates.slice(0,80);
  const rows=top.map(r=>{const left=(r._inicioP-minD)/86400000/span*100;const width=(r._finP-r._inicioP)/86400000/span*100;const clr=avClr(r);const ef=r._ef;const efcolor=efClr[ef]||'rgba(0,212,255,.5)';const isCrit=r['Ruta Crítica']==='Sí'||r['Ruta Crítica']==='Si';return`<div class="gantt-row" title="${esc(r.Ítem)} · ${esc(r.Avance)} · ${r._fs}"><div class="gantt-label" style="color:${isCrit?'var(--red)':'var(--text2)'};">${esc((r.Ítem||r.Proyecto).slice(0,22))}</div><div class="gantt-track"><div class="gantt-today" style="left:${todayPct.toFixed(1)}%"></div><div class="gantt-bar" style="left:${left.toFixed(1)}%;width:${Math.max(0.5,width).toFixed(1)}%;background:${clr};border:1px solid ${efcolor};opacity:.85;" title="${r._fs}"></div></div><div class="gantt-lbl">${r._fs}</div></div>`;}).join('');
  const fmt=d=>d.toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'2-digit'});
  return`<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:.62rem;color:var(--text3);margin-bottom:.4rem;padding:0 163px 0 168px;"><span>◀ ${fmt(minD)}</span><span style="color:var(--accent)">HOY (${fmt(today)})</span><span>${fmt(maxD)} ▶</span></div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .8rem;">
    <div style="padding-left:168px;position:relative;margin-bottom:.35rem;height:12px;">
      <div style="position:absolute;left:calc(168px + ${todayPct.toFixed(1)}%);top:0;bottom:0;width:2px;background:var(--accent);opacity:.5;"></div>
    </div>
    ${rows}
    ${withDates.length>80?`<div style="font-size:.68rem;color:var(--text3);text-align:center;padding:.5rem;">Mostrando 80 de ${withDates.length} ítems con fechas</div>`:''}
  </div>
  <div class="scatter-legend" style="margin-top:.7rem;">
    ${Object.entries(AVANCE_CLR).slice(0,6).map(([k,v])=>`<span><span class="dot" style="background:${v}"></span>${k}</span>`).join('')}
    <span><span style="display:inline-block;width:2px;height:12px;background:var(--accent);vertical-align:middle;margin-right:.3rem;"></span>Hoy</span>
    <span style="color:var(--red)">• Ruta Crítica en rojo</span>
  </div>`;
}

// ══════════════════════════════════════════
// TAB: CRÍTICOS
// ══════════════════════════════════════════
function buildCrit(df){
  const isCrit=r=>r['Ruta Crítica']==='Sí'||r['Ruta Crítica']==='Si'||r['Ruta Crítica']==='SI';
  const venc=df.filter(r=>r._ef==='Vencido'||r._ef==='Urgente (≤7d)');
  const rc=df.filter(isCrit);
  const rcVenc=rc.filter(r=>r._ef==='Vencido'||r._ef==='Urgente (≤7d)');
  const efClr={'Vencido':'clate','Urgente (≤7d)':'cwarn','Próximo (≤30d)':'','A tiempo':'','Sin Fecha':'na'};
  const rows=[...venc,...rcVenc.filter(r=>!venc.includes(r))].sort((a,b)=>(a._diasHoy??999)-(b._diasHoy??999));
  const tRows=rows.map(r=>[isCrit(r)?'🔴 RC':'',r.Grupo,r.Proyecto,r['Fase Proyecto']||'',r.Etapa,r.Ítem,r.Área,r._fs,r.Responsable,r.Avance,r._ef,r._diasHoy!==null?r._diasHoy:'',r._desvLabel||'']);
  return`<div class="stat-row">
    <div class="stat-card red"><div class="sv">${venc.filter(r=>r._ef==='Vencido').length}</div><div class="sl">Vencidos</div></div>
    <div class="stat-card ylw"><div class="sv">${venc.filter(r=>r._ef==='Urgente (≤7d)').length}</div><div class="sl">Urgentes ≤7d</div></div>
    <div class="stat-card pur"><div class="sv">${rc.length}</div><div class="sl">Ruta Crítica</div></div>
    <div class="stat-card red"><div class="sv">${rcVenc.length}</div><div class="sl">RC + Crítico</div></div>
  </div>
  ${mktbl('crit',['RC','Grupo','Proyecto','Fase PAI','Etapa','Ítem','Área','Fin Plan','Responsable','Avance','Estado','Días Rest.','Desviación'],tRows,null,{1:'left',2:'left',4:'left',5:'left',8:'left'},(v,ci,row)=>{const ef=row[10];if(ci===0&&v.includes('RC'))return 'clate';if(ci===10)return efClr[ef]||'';if(ci===11&&typeof v==='number'&&v<0)return 'clate rv';if(ci===12){const s=String(v);return s.includes('tardío')?'clate':s.includes('anticipado')?'cearly':'';}return '';})}`;
}

// ══════════════════════════════════════════
// TAB: RESPALDOS 📎
// ══════════════════════════════════════════
function buildResp(df){
  const noVerif = df.every(r=>r._adjunto==='No verificado'||r._adjunto===undefined);

  if(noVerif){
    return`<div class="insight-box" style="border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05);">
      <strong>⚠️ Adjuntos no verificados</strong><br/>
      La consulta de subelementos no se realizó (carga desde archivo) o falló durante la conexión API.<br/>
      Usa la conexión directa por API key para activar esta verificación.
    </div>`;
  }

  const sinResp  = df.filter(r=>r._adjunto==='Sin Respaldo');
  const conResp  = df.filter(r=>r._adjunto==='OK');
  const sinSubs  = df.filter(r=>r._adjunto==='Sin subelementos');
  const total    = df.length;

  // Agrupar por Proyecto
  const porProy  = {};
  df.forEach(r=>{
    const p = r.Proyecto;
    if(!porProy[p]) porProy[p]={total:0,sinResp:0,conResp:0,sinSubs:0};
    porProy[p].total++;
    if(r._adjunto==='Sin Respaldo') porProy[p].sinResp++;
    else if(r._adjunto==='OK')      porProy[p].conResp++;
    else                             porProy[p].sinSubs++;
  });
  const proyRows = Object.entries(porProy)
    .map(([p,v])=>[p, v.total, v.conResp, v.sinResp, v.sinSubs, v.total?Math.round(v.conResp/v.total*100)+'%':''])
    .sort((a,b)=>b[3]-a[3]); // orden: más sin respaldo primero

  // Agrupar por Área
  const porArea = {};
  df.forEach(r=>{
    const a = r.Área;
    if(!porArea[a]) porArea[a]={total:0,sinResp:0};
    porArea[a].total++;
    if(r._adjunto==='Sin Respaldo') porArea[a].sinResp++;
  });
  const areaRows = Object.entries(porArea)
    .filter(([,v])=>v.sinResp>0)
    .map(([a,v])=>[a, v.total, v.sinResp, Math.round(v.sinResp/v.total*100)+'%'])
    .sort((a,b)=>b[2]-a[2]);

  // Detalle de ítems sin respaldo — con subelementos que faltan
  const detRows = sinResp.map(r=>[
    r.Grupo, r.Proyecto, r.Etapa, r.Ítem, r.Área, r.Responsable, r.Avance, r._ef,
    r._adjTotal>0 ? r._adjTotal : '—',
    r._adjSinArchivo && r._adjSinArchivo.length > 0
      ? r._adjSinArchivo.join(' / ')
      : 'Todos sin adjunto',
  ]).sort((a,b)=>a[1].localeCompare(b[1]));

  const pctOK = pct(conResp.length, total - sinSubs.length);

  return`
  <div class="insight-box" style="${sinResp.length>0?'border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.04);':'border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04);'}">
    <strong>${sinResp.length>0?'⚠️ Hay ítems sin respaldo cargado':'✅ Todos los ítems tienen respaldo'}</strong>
    <div class="insight-row">
      <div class="istat"><div class="iv" style="color:var(--red)">${sinResp.length}</div><div class="il">Sin respaldo</div></div>
      <div class="istat"><div class="iv" style="color:var(--ok)">${conResp.length}</div><div class="il">Con respaldo (${pctOK}%)</div></div>
      <div class="istat"><div class="iv" style="color:var(--text3)">${sinSubs.length}</div><div class="il">Sin subelementos</div></div>
      <div class="istat"><div class="iv" style="color:var(--accent)">${total}</div><div class="il">Total ítems</div></div>
    </div>
  </div>

  <div class="dash-grid" style="margin-bottom:.9rem;">
    <div class="dc c6">
      <h3><span class="dot" style="background:var(--red)"></span>Sin respaldo por Área</h3>
      ${areaRows.length
        ? areaRows.map(([a,tot,sr,pct])=>`
          <div style="display:flex;align-items:center;gap:.6rem;padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.73rem;">
            <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);">${esc(a)}</div>
            <div style="font-family:var(--mono);font-size:.68rem;color:var(--red);width:18px;text-align:right;">${sr}</div>
            <div style="width:70px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;">
              <div style="height:100%;width:${pct};background:var(--red);border-radius:3px;"></div>
            </div>
            <div style="font-family:var(--mono);font-size:.65rem;color:var(--text3);width:30px;text-align:right;">${pct}</div>
          </div>`).join('')
        : '<div style="color:var(--ok);font-size:.75rem;padding:.8rem;text-align:center;">✅ Todas las áreas tienen respaldo</div>'
      }
    </div>
    <div class="dc c6">
      <h3><span class="dot" style="background:var(--warn)"></span>Resumen por Proyecto</h3>
      <div style="max-height:280px;overflow-y:auto;">
      ${proyRows.map(([p,tot,ok,sr,ss,pctok])=>`
        <div style="display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.7rem;">
          <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${sr>0?'var(--text)':'var(--text3)'};" title="${esc(p)}">${esc(p.length>32?p.slice(0,32)+'…':p)}</div>
          ${sr>0?`<span style="font-size:.62rem;background:rgba(239,68,68,.2);color:#fca5a5;border-radius:3px;padding:.05rem .35rem;flex-shrink:0;">Sin respaldo: ${sr}</span>`
                :`<span style="font-size:.62rem;background:rgba(34,197,94,.15);color:#86efac;border-radius:3px;padding:.05rem .35rem;flex-shrink:0;">✓ OK</span>`}
        </div>`).join('')}
      </div>
    </div>
  </div>

  <div class="stitle">Ítems SIN respaldo — detalle completo (${detRows.length})</div>
  ${detRows.length
    ? mktbl('respdet',
        ['Grupo','Proyecto','Etapa','Ítem','Área','Responsable','Avance','Estado Fecha','Sub.Total','Subelementos sin adjunto'],
        detRows, null,
        {0:'left',1:'left',3:'left',4:'left',5:'left',9:'left'},
        (v,ci,row)=>{
          if(ci===7){const ef=row[7];return ef==='Vencido'?'clate':ef==='Urgente (≤7d)'?'cwarn':'';}
          if(ci===9)return 'clate';
          return '';
        })
    : '<div style="color:var(--ok);font-size:.8rem;padding:1.2rem;text-align:center;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:8px;">✅ Todos los ítems tienen al menos un respaldo adjunto en sus subelementos.</div>'
  }

  <div class="stitle">Resumen por Proyecto — tabla completa</div>
  ${mktbl('respproy',
    ['Proyecto','Total ítems','Con respaldo','Sin respaldo','Sin subelementos','% OK'],
    proyRows, null,
    {0:'left'},
    (v,ci)=>{
      if(ci===3&&typeof v==='number'&&v>0) return 'clate rv';
      if(ci===2&&typeof v==='number'&&v>0) return 'cearly ok';
      if(ci===5){const n=parseInt(v);return n>=80?'cearly':n>=50?'':n>0?'cwarn':'clate';}
      return '';
    })}`;
}

// ══════════════════════════════════════════
// TAB: DETALLE
// ══════════════════════════════════════════
function buildDet(df){
  const isCrit=r=>r['Ruta Crítica']==='Sí'||r['Ruta Crítica']==='Si';
  const efClr={'Vencido':'clate','Urgente (≤7d)':'cwarn','Próximo (≤30d)':'','A tiempo':'cearly','Sin Fecha':'na'};
  const sorted=[...df].sort((a,b)=>{const o=['Vencido','Urgente (≤7d)','Sin Fecha','Próximo (≤30d)','A tiempo'];return(o.indexOf(a._ef)-o.indexOf(b._ef))||((a._diasHoy??999)-(b._diasHoy??999));});
  const adjClr={'OK':'cearly','Sin Respaldo':'clate','Sin subelementos':'na','No verificado':'na'};
  const rows=sorted.map(r=>[isCrit(r)?'RC':'',r.Grupo,r.Proyecto,r['Fase Proyecto']||'',r.Etapa,r.Ítem,r.Área,r.Responsable,r.Avance,r._inicioP?r._inicioP.toLocaleDateString('es-CL'):'',r._fs,r._diasHoy!==null?r._diasHoy:'',r._durPlan??'',r._durReal??'',r._desvLabel||'',r['Plazo Est']??'',r._ef,r._adjunto||'No verificado']);
  return mktbl('det',['RC','Grupo','Proyecto','Fase','Etapa','Ítem','Área','Responsable','Avance','Inicio Plan','Fin Plan','Días Rest.','Dur.Plan(d)','Dur.Real(d)','Desviación','Est(d)','Estado','📎 Respaldo'],rows,null,{1:'left',2:'left',5:'left',7:'left'},(v,ci,row)=>{const ef=row[16];if(ci===0&&v==='RC')return 'clate';if(ci===16)return efClr[ef]||'';if(ci===11&&typeof v==='number'&&v<0)return 'clate rv';if(ci===14){const s=String(v);return s.includes('tardío')?'clate':s.includes('anticipado')?'cearly':s==='0d (puntual)'?'contime':s?'':'na';}if(ci===17)return adjClr[v]||'';return '';});
}

// ══════════════════════════════════════════
// TABLE BUILDER
// ══════════════════════════════════════════
function mktbl(id,hdrs,brows,frow,hc={},cfn=null){
  const cv=hdrs.map((_,ci)=>brows.map(r=>String(r[ci]??'')));
  window.CVMap[id]=cv;
  let h=`<div class="tbl-info"><span id="i-${id}">Mostrando ${brows.length} filas</span></div><div class="table-scroll"><table id="t-${id}"><thead><tr>`;
  hdrs.forEach((hdr,i)=>{const cls=hc[i]||'',isL=cls.includes('left')||i===0;h+=`<th class="${isL?'left':''} ${cls}" onclick="srt('${id}',${i},this)">${hdr}<i class="si"></i><span class="cf" title="Filtrar" onclick="event.stopPropagation();openCF(this.parentElement,'${id}',${i})">▾</span></th>`;});
  h+='</tr></thead><tbody>';
  brows.forEach(row=>{h+='<tr>';row.forEach((cell,ci)=>{let tc=cfn?cfn(cell,ci,row)||'':'';const isL=ci===0||tc.includes('left')||((hc[ci]||'').includes('left'));h+=`<td class="${isL?'left':''} ${tc}">${cell??''}</td>`;});h+='</tr>';});
  h+='</tbody>';
  if(frow){h+='<tfoot><tr>';frow.forEach((c,i)=>h+=`<td class="${i===0?'left':''}">${c}</td>`);h+='</tr></tfoot>';}
  return h+'</table></div>';
}
function srt(tid,ci,th){const tbl=document.getElementById('t-'+tid);if(!tbl)return;const asc=th.classList.contains('asc');tbl.querySelectorAll('thead th').forEach(t=>t.classList.remove('asc','desc'));th.classList.toggle('asc',!asc);th.classList.toggle('desc',asc);const tbody=tbl.querySelector('tbody');[...tbody.querySelectorAll('tr')].sort((a,b)=>{const av=a.cells[ci]?.textContent.trim()||'',bv=b.cells[ci]?.textContent.trim()||'';const an=parseFloat(av),bn=parseFloat(bv);if(!isNaN(an)&&!isNaN(bn))return asc?bn-an:an-bn;return asc?bv.localeCompare(av,'es'):av.localeCompare(bv,'es');}).forEach(r=>tbody.appendChild(r));}

// COL FILTER
let acd=null;
document.addEventListener('click',e=>{if(!e.target.closest('.cdrop')&&!e.target.closest('.cf')){document.getElementById('cdrop').style.display='none';acd=null;}});
function openCF(th,tid,ci){
  const dd=document.getElementById('cdrop');
  if(acd&&acd.tid===tid&&acd.ci===ci){dd.style.display='none';acd=null;return;}acd={tid,ci};
  const all=(window.CVMap[tid]||[])[ci]||[];const uniq=[...new Set(all)].sort();const cur=CF[tid]&&CF[tid][ci]?CF[tid][ci]:new Set(uniq);
  dd.innerHTML=`<input type="text" placeholder="Buscar…" id="ddS" onclick="event.stopPropagation()"/><div id="ddL">${uniq.map(v=>`<label><input type="checkbox" value="${esc(v)}" ${cur.has(v)?'checked':''}/>${esc(v)}</label>`).join('')}</div><div class="dda"><button onclick="ddA()">Todos</button><button onclick="ddN()">Ninguno</button><button class="dok" onclick="apCF('${tid}',${ci})">Aplicar ✓</button></div>`;
  document.getElementById('ddS').addEventListener('input',e=>{const q=e.target.value.toLowerCase();dd.querySelectorAll('#ddL label').forEach(l=>{l.style.display=l.textContent.toLowerCase().includes(q)?'':'none';});});
  const rect=th.getBoundingClientRect();dd.style.display='block';dd.style.top=(rect.bottom+4+window.scrollY)+'px';dd.style.left=Math.min(rect.left+window.scrollX,window.innerWidth-185)+'px';
}
function ddA(){document.getElementById('cdrop').querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=true);}
function ddN(){document.getElementById('cdrop').querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);}
function apCF(tid,ci){const dd=document.getElementById('cdrop');const chk=new Set([...dd.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value));if(!CF[tid])CF[tid]={};CF[tid][ci]=chk;apColF(tid);const tbl=document.getElementById('t-'+tid);if(tbl){const th=tbl.querySelectorAll('thead th')[ci];if(th)th.classList.toggle('hf',chk.size>0);}dd.style.display='none';acd=null;}
function apColF(tid){const tbl=document.getElementById('t-'+tid);if(!tbl)return;const flt=CF[tid]||{};let vis=0;tbl.querySelectorAll('tbody tr').forEach(tr=>{const cells=[...tr.querySelectorAll('td')];let ok=true;for(const[ci,allowed]of Object.entries(flt)){if(!allowed||!allowed.size)continue;const ct=(cells[ci]?.textContent||'').trim();if(!allowed.has(ct)){ok=false;break;}}tr.classList.toggle('fout',!ok);if(ok)vis++;});const info=document.getElementById('i-'+tid);if(info)info.textContent=`Mostrando ${vis} filas`;}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function uq(arr){return[...new Set(arr)].filter(x=>x!=null&&x!=='').sort();}
function sm(o){return Object.values(o).reduce((a,b)=>a+b,0);}
function pct(n,t){return t?Math.round(n/t*100):0;}

// ══════════════════════════════════════════
// EXCEL EXPORT
// ══════════════════════════════════════════
document.getElementById('btnDl').addEventListener('click',()=>{if(DF.length)exportXL(DF);});
function exportXL(df){
  const wb=XLSX.utils.book_new();
  function addS(name,H,rows){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([H,...rows]),name.slice(0,31));}
  // Detalle completo
  addS('Detalle',['Grupo','Proyecto','Etapa','Ítem','Área','Responsable','Avance','RC','Inicio Plan','Fin Plan','Fin Real','Días Restantes','Dur.Plan(d)','Dur.Real(d)','Desviación(d)','Est.Plazo(d)','Estado Fecha','📎 Respaldo','Subelementos sin adjunto'],df.map(r=>[r.Grupo,r.Proyecto,r.Etapa,r.Ítem,r.Área,r.Responsable,r.Avance,r['Ruta Crítica'],r._inicioP?r._inicioP.toLocaleDateString('es-CL'):'',r._fs,r._finR?r._finR.toLocaleDateString('es-CL'):'',r._diasHoy??'',r._durPlan??'',r._durReal??'',r._desv??'',r['Plazo Est']??'',r._ef,r._adjunto||'No verificado',(r._adjSinArchivo||[]).join(' / ')]));
  // Hoja específica: Sin respaldo
  const sinRespXL=df.filter(r=>r._adjunto==='Sin Respaldo');
  if(sinRespXL.length){addS('Sin Respaldo 📎',['Grupo','Proyecto','Etapa','Ítem','Área','Responsable','Avance','Estado Fecha','Sub.Total','Subelementos sin adjunto'],sinRespXL.map(r=>[r.Grupo,r.Proyecto,r.Etapa,r.Ítem,r.Área,r.Responsable,r.Avance,r._ef,r._adjTotal||0,(r._adjSinArchivo||[]).join(' / ')]));};
  // Por mes
  const mes=uq(df.map(r=>r._mes));addS('Por Mes',['Mes','Total','Vencidos','Urgentes','A tiempo','Sin Fecha'],mes.map(m=>{const it=df.filter(r=>r._mes===m);return[m,it.length,it.filter(r=>r._ef==='Vencido').length,it.filter(r=>r._ef==='Urgente (≤7d)').length,it.filter(r=>r._ef==='A tiempo').length,it.filter(r=>r._ef==='Sin Fecha').length];}));
  // Desviaciones
  const withDesv=df.filter(r=>r._desv!==null);addS('Desviaciones',['Proyecto','Etapa','Ítem','Área','Responsable','Fin Plan','Fin Real','Desviación(d)','Dur.Plan(d)','Dur.Real(d)'],withDesv.map(r=>[r.Proyecto,r.Etapa,r.Ítem,r.Área,r.Responsable,r._finP?r._finP.toLocaleDateString('es-CL'):'',r._finR?r._finR.toLocaleDateString('es-CL'):'',r._desv,r._durPlan??'',r._durReal??'']));
  // Estándares por tipo
  const tipoMap={};df.forEach(r=>{const t=r['Nombre Genérico']||r.Etapa||'Sin tipo';if(!tipoMap[t])tipoMap[t]={est:[],plan:[],real:[]};if(r['Plazo Est']!==null)tipoMap[t].est.push(r['Plazo Est']);if(r._durPlan!==null)tipoMap[t].plan.push(r._durPlan);if(r._durReal!==null)tipoMap[t].real.push(r._durReal);});
  const a=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
  addS('Estándares',['Tipo Actividad','n Plan','Prom.Est(d)','Prom.Plan(d)','Prom.Real(d)','Brecha(d)'],Object.entries(tipoMap).map(([k,v])=>{const ae=a(v.est),ap=a(v.plan),ar=a(v.real);return[k,v.plan.length,ae,ap,ar,ae!==null&&ap!==null?ap-ae:null];}));
  const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
  XLSX.writeFile(wb,`analisis_plazos_${ts}.xlsx`);
}

// ══════════════════════════════════════════
// PDF EXPORT
// ══════════════════════════════════════════
async function exportPDF(){
  const btn=document.getElementById('btnPdf');btn.textContent='⏳ Generando…';btn.disabled=true;
  try{
    const activeTab=document.querySelector('.tab.active');const tabName=activeTab?activeTab.textContent.trim():'Plazos';
    const activeSec=document.getElementById('sec-'+(activeTab?.dataset?.id))||document.querySelector('.section.active');
    if(!activeSec){alert('Sin contenido visible.');return;}
    const scrollDivs=[...activeSec.querySelectorAll('.table-scroll')];const orig=scrollDivs.map(d=>({d,ov:d.style.overflow,mh:d.style.maxHeight}));
    scrollDivs.forEach(d=>{d.style.overflow='visible';d.style.maxHeight='none';});
    await new Promise(r=>setTimeout(r,200));
    const canvas=await html2canvas(activeSec,{scale:1.5,useCORS:true,allowTaint:true,backgroundColor:'#080c14',scrollX:0,scrollY:0,width:activeSec.scrollWidth,height:activeSec.scrollHeight,windowWidth:document.documentElement.scrollWidth,logging:false});
    orig.forEach(({d,ov,mh})=>{d.style.overflow=ov;d.style.maxHeight=mh;});
    const{jsPDF}=window.jspdf;const ratio=canvas.width/canvas.height;const pdf=new jsPDF({orientation:ratio>0.8?'landscape':'portrait',unit:'mm',format:'a4'});
    const PW=pdf.internal.pageSize.getWidth(),PH=pdf.internal.pageSize.getHeight(),MX=8,MY=8,HDR=12,CW=PW-MX*2,CH=PH-MY-HDR-MY,mmPerPx=CW/canvas.width,pxPerPage=Math.floor(CH/mmPerPx);
    function header(p){pdf.setFontSize(7.5);pdf.setTextColor(100);pdf.text(`Análisis de Plazos  ·  ${tabName}`,MX,MY+5);pdf.setFontSize(6);pdf.setTextColor(130);pdf.text((lastMeta||'').slice(0,100),MX,MY+9);if(p>1){pdf.setFontSize(7);pdf.text(`${p}`,PW-MX-4,MY+5);}pdf.setDrawColor(40);pdf.setLineWidth(0.12);pdf.line(MX,MY+HDR-2,PW-MX,MY+HDR-2);}
    header(1);let y=0,page=1;
    while(y<canvas.height){const take=Math.min(pxPerPage,canvas.height-y);const sc=document.createElement('canvas');sc.width=canvas.width;sc.height=take;sc.getContext('2d').drawImage(canvas,0,y,canvas.width,take,0,0,canvas.width,take);const hMm=take*mmPerPx;pdf.addImage(sc.toDataURL('image/jpeg',.88),'JPEG',MX,MY+HDR,CW,hMm);y+=take;if(y<canvas.height){pdf.addPage();page++;header(page);}}
    const ts=new Date().toISOString().slice(0,10);pdf.save(`plazos_${tabName.replace(/[^\w]/g,'_')}_${ts}.pdf`);
  }catch(err){alert('Error PDF: '+err.message);}
  finally{btn.textContent='⬇ PDF';btn.disabled=false;}
}
