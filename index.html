<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Análisis de Plazos — Monday.com</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080c14;
  --surface:#0d1321;
  --panel:#111827;
  --card:#141c2e;
  --card2:#192236;
  --border:#1e2d47;
  --border2:#243659;
  --accent:#00d4ff;
  --accent-dim:rgba(0,212,255,.08);
  --accent2:#7c3aed;
  --ok:#22c55e;
  --warn:#f59e0b;
  --red:#ef4444;
  --late:#ff6b6b;
  --early:#34d399;
  --ontime:#60a5fa;
  --text:#e8f0fe;
  --text2:#94a3b8;
  --text3:#4a5568;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --glow:0 0 20px rgba(0,212,255,.15);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
button{font-family:var(--sans);cursor:pointer;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ══ LOGIN ══ */
#login-screen{align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 30% 20%, rgba(0,212,255,.06) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(124,58,237,.06) 0%, transparent 60%);}
.login-wrap{width:100%;max-width:540px;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo .brand{font-family:var(--mono);font-size:.72rem;letter-spacing:.25em;color:var(--accent);opacity:.7;text-transform:uppercase;}
.login-logo h1{font-size:1.8rem;font-weight:700;margin-top:.4rem;line-height:1.2;}
.login-logo h1 span{color:var(--accent);}
.login-logo .sub{font-size:.78rem;color:var(--text3);margin-top:.4rem;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.2rem;position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);}
.frow{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem;}
.frow label{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;}
.frow input[type=text],.frow input[type=password],.frow input[type=number]{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:.55rem .8rem;font-size:.85rem;font-family:var(--sans);outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
.frow input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.frow .hint{font-size:.68rem;color:var(--text3);margin-top:.25rem;}
.save-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1.2rem;font-size:.76rem;color:var(--text3);}
.save-row input[type=checkbox]{accent-color:var(--accent);}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),rgba(0,180,220,1));color:#050a14;border:none;border-radius:9px;padding:.8rem;font-size:.88rem;font-weight:700;letter-spacing:.03em;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-primary:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,212,255,.25);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.login-status{margin-top:1rem;font-size:.78rem;min-height:2rem;display:flex;flex-direction:column;gap:.28rem;}
.ls-line{display:flex;align-items:center;gap:.5rem;color:var(--text3);}
.ls-line.done{color:var(--ok);}
.ls-line.active{color:var(--accent);}
.ls-line.err{color:var(--red);}
.ls-spin{width:11px;height:11px;border:2px solid rgba(0,212,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{display:flex;align-items:center;gap:.8rem;margin:1.4rem 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:.7rem;color:var(--text3);}
.dz{border:2px dashed var(--border2);border-radius:10px;padding:1.4rem;cursor:pointer;transition:all .25s;background:rgba(255,255,255,.01);position:relative;text-align:center;}
.dz:hover,.dz.over{border-color:var(--accent);background:var(--accent-dim);}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz p{font-size:.76rem;color:var(--text3);}

/* PAI selector */
.pai-sel-title{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.6rem;}
.pai-ws-label{font-size:.68rem;color:var(--accent);margin:.6rem 0 .3rem;font-weight:600;font-family:var(--mono);letter-spacing:.05em;}
.pai-chip{display:flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:.4rem .7rem;margin-bottom:.3rem;cursor:pointer;transition:all .18s;}
.pai-chip:has(input:checked){border-color:var(--accent);background:var(--accent-dim);}
.pai-chip input[type=checkbox]{accent-color:var(--accent);flex-shrink:0;}
.pai-chip-name{font-size:.8rem;font-weight:600;color:var(--text);flex:1;}
.pai-chip-ws{font-size:.66rem;color:var(--text3);background:rgba(255,255,255,.04);border-radius:4px;padding:.08rem .35rem;}

/* ══ DASH ══ */
#dash-screen{flex-direction:column;}
.topbar{background:rgba(13,19,33,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.6rem 1.4rem;display:flex;align-items:center;gap:.7rem;position:sticky;top:0;z-index:100;}
.topbar-brand{font-family:var(--mono);font-size:.75rem;color:var(--accent);letter-spacing:.08em;white-space:nowrap;}
.topbar-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
.topbar-meta{font-size:.68rem;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-actions{display:flex;align-items:center;gap:.45rem;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border2);color:var(--text3);border-radius:6px;padding:.3rem .75rem;font-size:.72rem;display:flex;align-items:center;gap:.35rem;transition:all .18s;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.danger:hover{border-color:var(--red);color:var(--red);}
.tbtn.success{background:var(--ok);color:#071a0e;border-color:var(--ok);font-weight:700;}
.tbtn.spinning svg{animation:spin .8s linear infinite;}

/* FILTER BAR */
.filterbar{background:var(--panel);border-bottom:1px solid var(--border);padding:.5rem 1.4rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.fsearch{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:.28rem .65rem;font-size:.75rem;font-family:var(--sans);outline:none;transition:border-color .2s;width:200px;}
.fsearch:focus{border-color:var(--accent);}
.filter-tags{display:flex;flex-wrap:wrap;gap:.3rem;flex:1;}
.ftag{display:inline-flex;align-items:center;gap:.25rem;background:var(--card);border:1px solid var(--border2);border-radius:99px;padding:.2rem .6rem;font-size:.69rem;color:var(--text2);cursor:pointer;transition:all .16s;white-space:nowrap;}
.ftag:hover{border-color:var(--accent);color:var(--text);}
.ftag.has-filter{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);}
.ftag .ftag-count{background:var(--accent);color:#050a14;border-radius:99px;font-size:.57rem;font-family:var(--mono);padding:.03rem .28rem;font-weight:700;}
.btn-clr{background:none;border:1px solid var(--border2);color:var(--text3);border-radius:6px;padding:.24rem .65rem;font-size:.69rem;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-clr:hover{border-color:var(--warn);color:var(--warn);}
.fcount{font-family:var(--mono);font-size:.67rem;color:var(--accent);white-space:nowrap;}

/* MSDROP */
.msdrop{position:fixed;z-index:9998;background:var(--card2);border:1px solid var(--accent);border-radius:10px;padding:.5rem;min-width:200px;max-width:280px;max-height:310px;display:flex;flex-direction:column;gap:.3rem;box-shadow:0 16px 48px rgba(0,0,0,.8),var(--glow);}
.msdrop-search{background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:.28rem .5rem;font-size:.73rem;outline:none;font-family:var(--sans);width:100%;flex-shrink:0;}
.msdrop-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;}
.msdrop-list label{display:flex;align-items:center;gap:.4rem;padding:.22rem .3rem;font-size:.73rem;cursor:pointer;border-radius:4px;transition:background .1s;color:var(--text2);}
.msdrop-list label:hover{background:rgba(0,212,255,.08);color:var(--text);}
.msdrop-list label.checked{color:var(--text);}
.msdrop-list label input[type=checkbox]{accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.msdrop-footer{display:flex;gap:.3rem;flex-shrink:0;border-top:1px solid var(--border);padding-top:.3rem;}
.msdrop-footer button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text3);border-radius:5px;padding:.22rem;font-size:.67rem;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.msdrop-footer button:hover{border-color:var(--accent);color:var(--text);}
.msdrop-footer .ms-ok{background:var(--accent)!important;border-color:var(--accent)!important;color:#050a14!important;font-weight:700!important;}

/* KPI STRIP */
.kpi-strip{padding:.75rem 1.4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.45rem;background:var(--bg);border-bottom:1px solid var(--border);}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .55rem .5rem;text-align:center;transition:all .2s;cursor:default;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kclr,var(--border));}
.kpi:hover{transform:translateY(-1px);border-color:var(--kclr,var(--border));box-shadow:0 4px 16px rgba(0,0,0,.3);}
.kv{font-family:var(--mono);font-size:1.55rem;font-weight:700;line-height:1;color:var(--kclr,var(--text));}
.kl{font-size:.56rem;color:var(--text3);margin-top:.2rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.ksub{font-family:var(--mono);font-size:.6rem;color:var(--text3);margin-top:.08rem;}

/* MAIN */
.main{flex:1;padding:.85rem 1.4rem 3rem;}
.tabs{display:flex;gap:.28rem;flex-wrap:wrap;margin-bottom:.65rem;border-bottom:1px solid var(--border);padding-bottom:.4rem;}
.tab{background:none;border:1px solid transparent;color:var(--text3);border-radius:6px;padding:.28rem .7rem;font-size:.71rem;transition:all .16s;font-weight:500;font-family:var(--sans);}
.tab:hover{background:var(--card);color:var(--text);}
.tab.active{background:var(--accent);color:#050a14;font-weight:700;border-color:var(--accent);}
.section{display:none;}.section.active{display:block;}

/* GRID */
.dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:.85rem;}
.dc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem .8rem;position:relative;}
.dc h3{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem;}
.dc h3 .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dc.c3{grid-column:span 3;}.dc.c4{grid-column:span 4;}.dc.c6{grid-column:span 6;}.dc.c8{grid-column:span 8;}.dc.c12{grid-column:span 12;}
@media(max-width:960px){.dc.c3,.dc.c4,.dc.c6,.dc.c8{grid-column:span 12;}}
.cw{position:relative;}
.cw.h180{height:180px;}.cw.h220{height:220px;}.cw.h260{height:260px;}.cw.h300{height:300px;}.cw.h340{height:340px;}

/* TABLES */
.tbl-wrap{overflow:hidden;}
.tbl-info{font-size:.66rem;color:var(--text3);margin-bottom:.25rem;}
.table-scroll{overflow-x:auto;border-radius:9px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:.73rem;}
thead th{background:var(--panel);color:var(--text2);padding:.48rem .65rem;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border2);font-size:.6rem;letter-spacing:.05em;font-weight:700;text-transform:uppercase;font-family:var(--mono);cursor:pointer;user-select:none;}
thead th:hover{background:var(--card2);color:var(--text);}
thead th.left{text-align:left;}
thead th .si{margin-left:.2em;opacity:.3;font-size:.6em;}
thead th.asc .si::after{content:'▲';opacity:1;}
thead th.desc .si::after{content:'▼';opacity:1;}
thead th .si::after{content:'⇅';}
/* header color classes */
thead th.ha{background:rgba(0,212,255,.1);}
thead th.hg{background:rgba(34,197,94,.1);}
thead th.hr{background:rgba(239,68,68,.1);}
thead th.hw{background:rgba(245,158,11,.1);}
thead th.ht{background:rgba(0,212,255,.2);}
thead th.hp{background:rgba(124,58,237,.1);}
/* col filter icon */
.cf{display:inline-block;margin-left:.25em;font-size:.7em;opacity:.25;cursor:pointer;transition:opacity .15s;vertical-align:middle;}
th:hover .cf,.hf .cf{opacity:1;}
th.hf .cf{color:var(--accent);}

tbody tr:nth-child(odd) td{background:var(--surface);}
tbody tr:nth-child(even) td{background:var(--panel);}
tbody tr:hover td{background:rgba(0,212,255,.04)!important;}
tbody tr.fout{display:none;}
td{padding:.42rem .65rem;border-bottom:1px solid rgba(255,255,255,.025);text-align:center;color:var(--text);white-space:nowrap;}
td.left{text-align:left;}

/* cell colorings */
td.clate{background:rgba(239,68,68,.12)!important;color:#fca5a5;font-weight:600;}
td.cearly{background:rgba(34,197,94,.08)!important;color:#86efac;font-weight:600;}
td.contime{background:rgba(96,165,250,.08)!important;color:#93c5fd;}
td.cwarn{background:rgba(245,158,11,.1)!important;color:#fcd34d;}
td.ctotal{background:rgba(0,212,255,.12)!important;color:var(--accent);font-weight:700;}
td.cpur{background:rgba(124,58,237,.1)!important;color:#c4b5fd;}
td.vz{color:var(--border2);}
td.vp{color:var(--ok);font-weight:600;}
td.rv{color:var(--red);font-weight:700;}
td.wv{color:var(--warn);font-weight:700;}
td.ok{color:var(--ok);font-weight:700;}
td.na{color:var(--text3);font-style:italic;}
tfoot td{background:rgba(0,212,255,.1)!important;color:var(--accent);font-family:var(--mono);font-size:.63rem;font-weight:700;border-top:2px solid rgba(0,212,255,.25);padding:.45rem .65rem;text-align:center;}
tfoot td.left{text-align:left;}

.stitle{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin:1.1rem 0 .4rem;display:flex;align-items:center;gap:.5rem;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}

/* Desviación bar sparkline */
.dev-bar{display:inline-flex;align-items:center;gap:.35rem;font-family:var(--mono);font-size:.7rem;}
.dev-track{width:50px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;}
.dev-fill{height:100%;border-radius:3px;transition:width .3s;}

/* Timeline gantt mini */
.gantt-row{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.7rem;}
.gantt-label{width:160px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);}
.gantt-track{flex:1;height:14px;background:var(--panel);border-radius:4px;position:relative;overflow:visible;}
.gantt-bar{position:absolute;height:100%;border-radius:4px;transition:all .3s;}
.gantt-today{position:absolute;width:2px;top:-4px;bottom:-4px;background:var(--accent);opacity:.7;z-index:5;}
.gantt-lbl{font-family:var(--mono);font-size:.58rem;color:var(--text3);width:55px;flex-shrink:0;text-align:right;}

/* Stat card inline */
.stat-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.7rem;}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;flex:1;min-width:120px;}
.stat-card .sv{font-family:var(--mono);font-size:1.2rem;font-weight:700;}
.stat-card .sl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:.1rem;}
.stat-card.red .sv{color:var(--red);}
.stat-card.grn .sv{color:var(--ok);}
.stat-card.blu .sv{color:var(--accent);}
.stat-card.pur .sv{color:var(--accent2);}
.stat-card.ylw .sv{color:var(--warn);}

/* Scatter dot */
.scatter-legend{display:flex;gap:1rem;flex-wrap:wrap;font-size:.66rem;color:var(--text3);margin-top:.4rem;}
.scatter-legend span{display:flex;align-items:center;gap:.3rem;}
.scatter-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

/* CDROP */
.cdrop{position:fixed;z-index:9999;background:var(--card2);border:1px solid var(--accent);border-radius:9px;padding:.5rem;min-width:175px;max-height:290px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.8);}
.cdrop input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:.26rem .5rem;font-size:.7rem;margin-bottom:.35rem;outline:none;font-family:var(--sans);}
.cdrop label{display:flex;align-items:center;gap:.35rem;padding:.2rem .25rem;font-size:.7rem;cursor:pointer;border-radius:4px;transition:background .1s;color:var(--text2);}
.cdrop label:hover{background:rgba(0,212,255,.08);color:var(--text);}
.cdrop label input[type=checkbox]{accent-color:var(--accent);}
.dda{display:flex;gap:.28rem;margin-top:.35rem;border-top:1px solid var(--border);padding-top:.35rem;}
.dda button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text3);border-radius:5px;padding:.22rem;font-size:.65rem;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.dda button:hover{border-color:var(--accent);color:var(--text);}
.dok{background:var(--accent)!important;border-color:var(--accent)!important;color:#050a14!important;font-weight:700!important;}

/* Insight box */
.insight-box{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);border-left:3px solid var(--accent);border-radius:8px;padding:.65rem .9rem;margin-bottom:.8rem;font-size:.76rem;line-height:1.6;color:var(--text2);}
.insight-box strong{color:var(--accent);}
.insight-box .insight-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:.5rem;}
.insight-box .istat{text-align:center;}
.insight-box .istat .iv{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--text);}
.insight-box .istat .il{font-size:.63rem;color:var(--text3);}

/* Tooltip custom */
.tip{position:fixed;z-index:9999;background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.5rem .7rem;font-size:.72rem;color:var(--text);pointer-events:none;max-width:220px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.6);}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen" class="screen active">
  <div class="login-wrap" style="margin:auto;">
    <div class="login-logo">
      <div class="brand">Monday.com · Análisis de Tiempos</div>
      <h1>Plazos & <span>Desviaciones</span></h1>
      <div class="sub">Analiza cumplimiento, desviaciones y estándares de tiempo por proyecto</div>
    </div>
    <div class="login-card">
      <div class="frow">
        <label>API Key de Monday.com</label>
        <input type="password" id="apikey" placeholder="eyJhbGciOiJIUzI1NiJ9…" autocomplete="off"/>
        <span class="hint">Settings → Developers → My Access Tokens</span>
      </div>
      <div class="save-row">
        <input type="checkbox" id="savekey" checked/>
        <label for="savekey">Guardar clave en este navegador</label>
      </div>
      <div class="frow">
        <label>Máximo de tableros por lote</label>
        <input type="number" id="maxboards" value="12" min="1" max="50" style="width:100px"/>
      </div>

async function runQuery(apikey,query){
  const isFile=location.protocol==='file:';
  const body=JSON.stringify({query});
  const headers={'Content-Type':'application/json','Authorization':apikey,'API-Version':'2026-01'};
  if(!isFile){const r=await fetch(API_URL,{method:'POST',headers,body});if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();if(j.errors)throw new Error(j.errors[0].message);return j;}
  let lastErr='';
  for(const pFn of CORS_PROXIES){try{const r=await fetch(pFn(API_URL),{method:'POST',headers:{...headers,'X-Requested-With':'XMLHttpRequest'},body});if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const data=j.contents?JSON.parse(j.contents):j;if(data.errors)throw new Error(data.errors[0].message);return data;}catch(e){lastErr=e.message;}}
  throw new Error('No se pudo conectar: '+lastErr);
}
function chunk(arr,n){const o=[];for(let i=0;i<arr.length;i+=n)o.push(arr.slice(i,i+n));return o;}

// ══════════════════════════════════════════
// PAI DISCOVERY + BOARD LOADING (same as original)
// ══════════════════════════════════════════
async function findAllPAIBoards(apikey){
  const j=await runQuery(apikey,'query { boards (limit: 5000) { id name workspace { name } } }');
  const pais=j.data.boards.filter(b=>/^PAI\b/i.test(b.name.trim()));
  if(!pais.length)throw new Error('No se encontraron tableros PAI.');
  const grouped={};
  pais.forEach(b=>{const ws=b.workspace?.name||'Sin workspace';if(!grouped[ws])grouped[ws]=[];grouped[ws].push(b);});
  Object.values(grouped).forEach(arr=>arr.sort((a,b)=>a.name.localeCompare(b.name)));
  return{pais,grouped};
}

async function readPAIItems(apikey,paiId){
  const q=`query { boards (ids: [${paiId}]) { id name columns { id title type } items_page (limit: 500) { items { id name group { title } column_values { id text value type ... on StatusValue { label } ... on LinkValue { url text } } } } }}`;
  const j=await runQuery(apikey,q);
  const board=j.data.boards[0];
  if(!board)throw new Error('No se pudo leer el tablero PAI.');
  const colMap={};board.columns.forEach(col=>{colMap[col.id]={title:col.title,type:col.type};});
  const BOARD_ID_RE=/monday\.com\/boards\/(\d+)/i;
  const projects=[];
  for(const item of board.items_page.items){
    const proj={paiItemId:item.id,paiItemName:item.name,paiGroup:item.group.title,faseProyecto:'',linkedItems:[]};
    item.column_values.forEach(cv=>{
      const colDef=colMap[cv.id];if(!colDef)return;const t=colDef.title;
      if(t==='Fase de Proyecto'||t==='Fase Proyecto'||t==='Fase'){if(cv.label!=null&&cv.label!=='')proj.faseProyecto=cv.label;else if(cv.value&&cv.value!=='null'){try{const p=JSON.parse(cv.value);proj.faseProyecto=p.label||'';}catch(e){}}if(!proj.faseProyecto&&cv.text&&!/^\d+$/.test(cv.text.trim()))proj.faseProyecto=cv.text;}
      if(t==='Tableros Planificación'||t==='Tableros Planificacion'||t==='Tablero Planificación'||t==='Tablero Planificacion'){const allText=[cv.text||'',cv.url||'',cv.value||''].join(' ');const urlMatches=[...allText.matchAll(/monday\.com\/boards\/(\d+)/gi)];urlMatches.forEach(m=>{const id=m[1];if(!proj.linkedItems.find(x=>x.id===id)){const nm=(cv.text||'').match(/^(.*?)\s*-\s*https?:\/\//);const name=nm?nm[1].trim():(cv.text||'').split('-')[0].trim();proj.linkedItems.push({id,name});}});if(proj.linkedItems.length===0&&cv.value&&cv.value!=='null'){try{const p=JSON.parse(cv.value);const url=p.url||p.link||'';const m=url.match(/monday\.com\/boards\/(\d+)/i);if(m)proj.linkedItems.push({id:m[1],name:p.text||''});}catch(e){}}}
    });
    if(proj.linkedItems.length>0)projects.push(proj);
  }
  return projects;
}

async function getInfoBoards(apikey,ids){
  const q=`query { boards (ids: [${ids.join(',')}]) { id name columns { id title type } items_page (limit: 500) { items { id name group { title } column_values { id text value type ... on StatusValue { label } ... on DropdownValue { values { label } } ... on DateValue { date } ... on TimelineValue { from to } } } } }}`;
  const j=await runQuery(apikey,q);
  return jsonToRows(j.data.boards);
}

// ══════════════════════════════════════════
// SUBELEMENTOS — columna "Adjunto" (File)
// Consulta todos los subelementos de los ítems de los tableros dados
// y detecta cuáles tienen al menos un archivo en la columna "Adjunto".
// Devuelve un Map: itemId → { hasFile: bool, subitemNames: string[] }
// ══════════════════════════════════════════
async function getSubitemAdjuntos(apikey, boardIds){
  const result = new Map(); // itemId (padre) → {hasFile, sinAdjunto:[nombres]}
  const batches = chunk(boardIds, 10); // subitems query es pesada — lotes pequeños
  for(const batch of batches){
    try{
      // API 2026-01: subitems se acceden via items_page con subitems anidados
      const q=`query { boards (ids: [${batch.join(',')}]) {
        items_page (limit: 500) {
          items {
            id
            subitems {
              id name
              column_values {
                id title type text value
                ... on FileValue { files { id name url } }
              }
            }
          }
        }
      }}`;
      const j = await runQuery(apikey, q);
      for(const board of j.data.boards){
        for(const item of board.items_page.items){
          if(!item.subitems || !item.subitems.length) continue;
          const sinAdjunto = [];
          for(const sub of item.subitems){
            // Buscar columna "Adjunto" (File) — por título o por tipo file
            const adjCol = sub.column_values.find(cv=>
              cv.title === 'Adjunto' || cv.title === 'Adjuntos' ||
              cv.title === 'Archivo'  || cv.title === 'Archivos' ||
              cv.type  === 'file'
            );
            // Tiene archivo si: FileValue.files tiene elementos, o text no está vacío
            const hasFile = adjCol && (
              (adjCol.files && adjCol.files.length > 0) ||
              (adjCol.text && adjCol.text.trim() !== '' && adjCol.text !== '0')
            );
            if(!hasFile) sinAdjunto.push(sub.name || sub.id);
          }
          result.set(item.id, {
            hasFile: sinAdjunto.length === 0,   // true = todos tienen adjunto
            sinAdjunto,                          // nombres de subelementos sin adjunto
            total: item.subitems.length,
          });
        }
      }
    }catch(e){
      console.warn('[Adjuntos] Error en lote:', e.message);
    }
  }
  return result;
}

function jsonToRows(boards){
  const rows=[];
  for(const board of boards){
    const colMap={};board.columns.forEach(col=>{colMap[col.id]={title:col.title,type:col.type};});
    for(const item of board.items_page.items){
      const row={};
      row['board id']=board.id;row['board name']=board.name;row['group name']=item.group.title;row['item id']=item.id;row['Name']=item.name;
      item.column_values.forEach(cv=>{
        const colDef=colMap[cv.id];if(!colDef)return;
        const colTitle=colDef.title;if(colTitle==='Orden')return;
        const colType=cv.type||colDef.type||'';let val='';
        if(colType==='color'||colType==='status'){if(cv.label!=null&&cv.label!=='')val=cv.label;else if(cv.value&&cv.value!=='null'){try{const p=JSON.parse(cv.value);val=p.label||'';}catch(e){}}if(!val&&cv.text&&!/^\d+$/.test(cv.text.trim()))val=cv.text;}
        else if(colType==='dropdown'){if(cv.values&&cv.values.length)val=cv.values.map(v=>v.label||'').filter(Boolean).join(', ');if(!val&&cv.text&&!/^\d+$/.test(cv.text.trim()))val=cv.text;}
        else if(colType==='timeline'){const sd=s=>s?s.slice(0,10):'';if(cv.from&&cv.to)val=`${sd(cv.from)} - ${sd(cv.to)}`;else if(cv.from)val=sd(cv.from);else if(cv.text&&cv.text.trim())val=cv.text;else if(cv.value&&cv.value!=='null'){try{const p=JSON.parse(cv.value);if(p.from&&p.to)val=`${sd(p.from)} - ${sd(p.to)}`;else if(p.from)val=sd(p.from);}catch(e){}}}
        else if(colType==='date'){val=cv.date||cv.text||'';}
        else{val=cv.text||'';}
        row[colTitle]=val;
      });
      rows.push(row);
    }
  }
  return rows;
}

function logStep(msg,state='active'){const el=document.getElementById('login-status');const id='ls-'+Date.now();const spin=state==='active'?`<div class="ls-spin"></div>`:'';const icon=state==='done'?'✅':state==='err'?'❌':spin;el.innerHTML+=`<div class="ls-line ${state}" id="${id}">${icon} ${msg}</div>`;el.scrollTop=el.scrollHeight;return id;}
function updateStep(id,msg,state){const el=document.getElementById(id);if(!el)return;el.className='ls-line '+state;const icon=state==='done'?'✅':state==='err'?'❌':'';el.innerHTML=`${icon} ${msg}`;}

let _paiApiKey='',_paiMaxBoards=12;

async function startConnect(){

}

function showPAISelector(grouped,apikey,maxboards){
  _paiApiKey=apikey;_paiMaxBoards=maxboards;
  const container=document.getElementById('pai-selector');
  const savedPAIs=JSON.parse(localStorage.getItem('selected_pais')||'[]');

  <div style="display:flex;gap:.5rem;margin-bottom:.5rem;">
    <button type="button" onclick="paiSelAll(true)" style="background:none;border:1px solid var(--border2);color:var(--text3);border-radius:5px;padding:.2rem .65rem;font-size:.68rem;cursor:pointer;">☑ Todos</button>
    <button type="button" onclick="paiSelAll(false)" style="background:none;border:1px solid var(--border2);color:var(--text3);border-radius:5px;padding:.2rem .65rem;font-size:.68rem;cursor:pointer;">☐ Ninguno</button>
    <span id="pai-count" style="margin-left:auto;font-size:.68rem;color:var(--accent);align-self:center;font-family:var(--mono);"></span>

  });
  html+=`<button type="button" class="btn-primary" style="margin-top:.8rem" id="btnLoadPAI" onclick="confirmPAISelection()">Cargar datos de plazos</button>`;
  container.innerHTML=html;container.style.display='block';document.getElementById('btnConnect').disabled=false;updatePaiCount();
}
function paiSelAll(v){document.querySelectorAll('.pai-cb').forEach(cb=>cb.checked=v);updatePaiCount();}
function updatePaiCount(){const t=document.querySelectorAll('.pai-cb').length,s=document.querySelectorAll('.pai-cb:checked').length;const el=document.getElementById('pai-count');if(el)el.textContent=`${s}/${t}`;const btn=document.getElementById('btnLoadPAI');if(btn)btn.disabled=s===0;}

async function confirmPAISelection(){
  const checked=[...document.querySelectorAll('.pai-cb:checked')];
  if(!checked.length){alert('Selecciona al menos un PAI');return;}

  try{localStorage.setItem('selected_pais',JSON.stringify(selectedIds));localStorage.setItem('selected_pai_names',JSON.stringify(selectedNames));}catch(e){}
  lastConfig.paiNames=selectedNames;

  catch(err){logStep(`Error: ${err.message}`,'err');document.getElementById('pai-selector').style.display='block';if(btn)btn.disabled=false;}
}

async function loadFromPAI(apikey,maxboards,paiIds,paiNames){
  const s1=logStep(`Leyendo ${paiIds.length} PAI(s)…`);
  let allProjects=[];
  for(let i=0;i<paiIds.length;i++){updateStep(s1,`Leyendo ${paiNames[i]}…`,'active');const projects=await readPAIItems(apikey,paiIds[i]);projects.forEach(p=>{p.paiSource=paiNames[i];});allProjects=allProjects.concat(projects);}
  updateStep(s1,`${allProjects.length} proyectos con tableros vinculados`,'done');
  if(!allProjects.length)throw new Error('No se encontraron proyectos con tableros vinculados.');
  lastConfig.paiProjects=allProjects;
  const s2=logStep('Preparando tableros…');
  const boardToFase={},boardSet=new Map();
  allProjects.forEach(p=>{p.linkedItems.forEach(li=>{if(!boardSet.has(li.id))boardSet.set(li.id,{id:li.id,name:li.name});if(!boardToFase[li.id])boardToFase[li.id]={faseProyecto:p.faseProyecto,paiSource:p.paiSource};});});
  const linkedBoards=[...boardSet.values()];
  updateStep(s2,`${linkedBoards.length} tableros identificados`,'done');
  if(!linkedBoards.length)throw new Error('No se encontraron tableros de proyecto.');
  const boardIds=linkedBoards.map(b=>b.id);
  const batches=chunk(boardIds,maxboards);
  const s3=logStep(`Descargando ítems (${batches.length} lote(s))…`);
  let allRows=[];
  for(let i=0;i<batches.length;i++){updateStep(s3,`Lote ${i+1}/${batches.length}…`,'active');const rows=await getInfoBoards(apikey,batches[i]);allRows=allRows.concat(rows);}
  updateStep(s3,`${allRows.length} ítems descargados`,'done');
  const s4=logStep('Calculando plazos y desviaciones…');
  const normalized=normMonday(allRows);
  normalized.forEach(r=>{const info=boardToFase[r['board id']];r['Fase Proyecto']=info?info.faseProyecto:'';r['PAI Fuente']=info?info.paiSource:'';});
  RAW=enrich(normalized);
  updateStep(s4,`${RAW.length} ítems procesados`,'done');

  // ── Paso 5: consultar subelementos y adjuntos ──
  const s5=logStep('Verificando adjuntos en subelementos…');
  try{
    const adjMap = await getSubitemAdjuntos(apikey, boardIds);
    // Enriquecer cada fila con estado de adjunto
    RAW.forEach(r=>{
      const info = adjMap.get(r['item id']);
      if(!info){
        // Ítem sin subelementos registrados en la consulta
        r._adjunto = 'Sin subelementos';
        r._adjSinArchivo = [];
        r._adjTotal = 0;
      } else {
        r._adjunto = info.hasFile ? 'OK' : 'Sin Respaldo';
        r._adjSinArchivo = info.sinAdjunto;
        r._adjTotal = info.total;
      }
    });
    const sinResp = RAW.filter(r=>r._adjunto==='Sin Respaldo').length;
    updateStep(s5,`Adjuntos verificados — ${sinResp} ítems sin respaldo`,'done');
  } catch(e){
    // No bloquear la app si falla la consulta de adjuntos
    RAW.forEach(r=>{r._adjunto='No verificado';r._adjSinArchivo=[];r._adjTotal=0;});
    updateStep(s5,`Adjuntos: no se pudo verificar (${e.message})`,'err');
  }

  lastMeta=`${RAW.length} ítems · ${linkedBoards.length} tableros · ${paiNames.join(' + ')} · ${new Date().toLocaleTimeString('es-CL')}`;
  setTimeout(()=>{buildApp(RAW);showScreen('dash-screen');},400);
}

async function doRefresh(){
  if(!lastConfig)return;
  const btn=document.getElementById('btnRefresh');btn.classList.add('spinning');btn.disabled=true;
  try{
    const{apikey,maxboards}=lastConfig;
    const savedIds=JSON.parse(localStorage.getItem('selected_pais')||'[]');
    const savedNames=lastConfig.paiNames||JSON.parse(localStorage.getItem('selected_pai_names')||'[]')||savedIds;
    if(!savedIds.length){alert('No hay selección guardada.');return;}
    await loadFromPAI(apikey,maxboards,savedIds,savedNames);
    FKEYS.forEach(({id})=>GF[id]=new Set());document.getElementById('fS').value='';CF={};
    document.getElementById('topMeta').textContent=lastMeta;buildApp(RAW);

function loadFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  const r=new FileReader();
  r.onload=e=>{
    try{
      let rows;
      if(ext==='csv'){rows=normFile(csvFallback(e.target.result));}
      else{const wb=XLSX.read(e.target.result,{type:'binary',cellDates:false});const ws=wb.Sheets[wb.SheetNames[0]];rows=normFile(XLSX.utils.sheet_to_json(ws,{defval:'',raw:true}));}

    }catch(err){alert('Error: '+err.message);}

}
function csvFallback(text){const lines=text.split('\n');const hdrs=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));return lines.slice(1).filter(l=>l.trim()).map(l=>{const vals=l.split(',');return Object.fromEntries(hdrs.map((h,i)=>[h,(vals[i]||'').trim().replace(/"/g,'')]));});}
function normFile(rows){return rows.map(r=>{const o={};for(const k in r){const c=k.replace(/^\uFEFF/,'').trim();o[c.toLowerCase()==='group name'?'Grupo':c]=r[k];}if(!('Grupo'in o))o.Grupo='Sin Grupo';if(!('board name'in o)&&('Proyecto'in o))o['board name']=o['Proyecto'];if(!('Name'in o)&&('\u00cdtem'in o))o['Name']=o['\u00cdtem'];return o;});}

// ══════════════════════════════════════════
// NORMALIZE — enhanced with all date columns
// ══════════════════════════════════════════
function normMonday(rows){
  const DATE_RANGE_RE=/(\d{4}-\d{2}-\d{2})(?:T[\d:+\-.Z]+)?\s*-\s*(\d{4}-\d{2}-\d{2})(?:T[\d:+\-.Z]+)?/;
  const DATE_COLS=['Proyectado','Planificado','Plan PAI','Plan','Fecha Plan','Fechas','Timeline','Planificación','Rango','Periodo','Período'];
  return rows.map(r=>{
    const bname=String(r['board name']||'').trim();
    // Extract start AND end from timeline columns
    let inicioP='',finP='';
    for(const col of DATE_COLS){
      const val=String(r[col]||'').trim();if(!val)continue;
      const m=val.match(DATE_RANGE_RE);
      if(m){inicioP=m[1];finP=m[2];break;}
      if(val.match(/^\d{4}-\d{2}-\d{2}$/)){finP=val;break;}
    }
    if(!finP){for(const[k,v] of Object.entries(r)){if(typeof v!=='string')continue;const m=v.match(DATE_RANGE_RE);if(m){inicioP=m[1];finP=m[2];break;}}}
    // Real finish (date column "Real")
    let finR=String(r['Real']||r['Fecha Real']||r['Cierre']||'').trim();
    finR=finR.match(/^\d{4}-\d{2}-\d{2}/)?finR.slice(0,10):'';
    // Plazo estándar vs real
    const plazoEst=parseNum(r['Plazo Estándard']||r['Plazo Estandard']||r['Plazo Standard']||'');
    const plazoDias=parseNum(r['Plazo (días)']||r['Plazo'||'']);
    // Duración planificada (calculated from timeline)
    let durPlan=null;
    if(inicioP&&finP){const i=parseDate(inicioP),f=parseDate(finP);if(i&&f)durPlan=Math.round((f-i)/86400000);}
    const mYear=bname.match(/\((\d{4})\)/),mTipo=bname.match(/\[([^\]]+)\]/);
    return{
      Grupo:str(r['group name'],'Sin Grupo'),
      Proyecto:bname,
      Etapa:str(r['Etapa'],'Sin Etapa'),
      Ítem:str(r['Name']),
      Área:str(r['Área'],'Asignar Área'),
      Responsable:str(r['Responsable'],'⚠️ Sin Responsable'),
      Avance:str(r['Avance'],'Sin Estado'),
      'Inicio Plan':inicioP,
      'Fin Plan':finP,
      'Fin Real':finR,
      'Plazo Est':plazoEst,
      'Plazo Días':plazoDias,
      'Dur Plan':durPlan,
      'Nombre Genérico':str(r['Nombre Genérico']),
      'Ruta Crítica':str(r['Ruta Crítica']),
      'Riesgo':str(r['Riesgo']),
      'Fase Proyecto':str(r['Fase Proyecto'],''),
      'PAI Fuente':str(r['PAI Fuente'],''),
      'Tipo Proyecto':mTipo?mTipo[1]:'',
      'Año Proyecto':mYear?mYear[1]:'',
      'board id':r['board id'],
      'item id':r['item id'],
    };
  });
}
function parseNum(v){if(v===''||v===null||v===undefined)return null;const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?null:n;}
function str(v,def=''){const s=String(v===null||v===undefined?'':v).trim();return s||def;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══════════════════════════════════════════
// DATE PARSING
// ══════════════════════════════════════════
function parseDate(raw){
  if(!raw&&raw!==0)return null;
  if(raw instanceof Date){if(isNaN(raw.getTime()))return null;return new Date(raw.getFullYear(),raw.getMonth(),raw.getDate());}
  if(typeof raw==='number'){if(raw<1||raw>200000)return null;const serial=raw>60?raw-1:raw;const d=new Date(Date.UTC(1900,0,1)+((serial-1)*86400000));return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());}
  const s=String(raw).trim();if(!s)return null;
  let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:[T\s]|$)/);if(m){const[,y,mo,d]=m.map(Number);return new Date(y,mo-1,d);}
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m){const[,d,mo,y]=m.map(Number);return new Date(y,mo-1,d);}
  const nd=new Date(s);if(!isNaN(nd.getTime()))return nd;return null;
}

// ══════════════════════════════════════════
// ENRICH — core date analytics
// ══════════════════════════════════════════
function enrich(rows){
  const today=new Date();today.setHours(0,0,0,0);
  return rows.map(r=>{
    const finP=parseDate(r['Fin Plan']);
    const inicioP=parseDate(r['Inicio Plan']);
    const finR=parseDate(r['Fin Real']);
    const diasHoy=finP?Math.floor((finP-today)/86400000):null;
    // Estado de fecha
    let ef='Sin Fecha';
    if(finP){if(diasHoy<0)ef='Vencido';else if(diasHoy<=7)ef='Urgente (≤7d)';else if(diasHoy<=30)ef='Próximo (≤30d)';else ef='A tiempo';}
    const fs=finP?finP.toLocaleDateString('es-CL'):'Sin Fecha';
    const mes=finP?`${finP.getFullYear()}-${String(finP.getMonth()+1).padStart(2,'0')}`:'Sin Fecha';
    const trim=finP?`${finP.getFullYear()}-Q${Math.ceil((finP.getMonth()+1)/3)}`:'Sin Fecha';
    // Desviación: días entre fin planificado y fin real
    let desv=null,desvLabel='Sin dato';
    if(finP&&finR){desv=Math.floor((finR-finP)/86400000);desvLabel=desv>0?`+${desv}d (tardío)`:desv<0?`${desv}d (anticipado)`:'0d (puntual)';}
    // Duración real (si tiene fecha real e inicio)
    let durReal=null;
    if(inicioP&&finR)durReal=Math.floor((finR-inicioP)/86400000);
    // Duración planificada
    let durPlan=r['Dur Plan'];
    if(durPlan===null&&inicioP&&finP)durPlan=Math.floor((finP-inicioP)/86400000);
    // Eficiencia: durReal/durPlan
    let eficiencia=null;
    if(durPlan>0&&durReal!==null)eficiencia=Math.round((durReal/durPlan)*100);
    // Comparar vs estándar
    let vsEst=null,vsEstLabel='';
    if(r['Plazo Est']&&durReal!==null){vsEst=durReal-r['Plazo Est'];vsEstLabel=vsEst>0?`+${vsEst}d sobre estándar`:vsEst<0?`${vsEst}d bajo estándar`:'Cumple estándar';}
    else if(r['Plazo Est']&&finP&&diasHoy!==null){vsEst=Math.round((finP-today)/86400000);} // prospective vs est
    return{...r,_finP:finP,_inicioP:inicioP,_finR:finR,_diasHoy:diasHoy,_ef:ef,_fs:fs,_mes:mes,_trim:trim,_desv:desv,_desvLabel:desvLabel,_durPlan:durPlan,_durReal:durReal,_eficiencia:eficiencia,_vsEst:vsEst,_vsEstLabel:vsEstLabel};
  });
}

function updateKPIs(df){
  const conFecha=df.filter(r=>r._finP);
  const vencidos=df.filter(r=>r._ef==='Vencido');
  const withDesv=df.filter(r=>r._desv!==null);
  const late=withDesv.filter(r=>r._desv>0);
  const early=withDesv.filter(r=>r._desv<0);
  const ontime=withDesv.filter(r=>r._desv===0);
  const avgDesv=withDesv.length?Math.round(withDesv.reduce((s,r)=>s+r._desv,0)/withDesv.length):null;
  const withDur=df.filter(r=>r._durPlan!==null);
  const avgDur=withDur.length?Math.round(withDur.reduce((s,r)=>s+r._durPlan,0)/withDur.length):null;
  const criticos=df.filter(r=>r['Ruta Crítica']==='Sí'||r['Ruta Crítica']==='Si'||r['Ruta Crítica']==='SI');

  const sinRespaldo = df.filter(r=>r._adjunto==='Sin Respaldo').length;
  const noVerif     = df.filter(r=>r._adjunto==='No verificado').length;
  const adjKPI      = noVerif===df.length ? '-' : sinRespaldo;
  const adjSub      = noVerif===df.length ? 'No verificado' : `${pct(sinRespaldo,df.length)}% del total`;

  document.getElementById('kpis').innerHTML=[
    {v:df.length,l:'Total Ítems',c:'--accent',ksub:`${conFecha.length} con fecha`},
    {v:vencidos.length,l:'Vencidos',c:'--red',ksub:conFecha.length?`${pct(vencidos.length,conFecha.length)}% del total`:''},
    {v:df.filter(r=>r._ef==='Urgente (≤7d)').length,l:'Urgentes ≤7d',c:'--warn',ksub:''},
    {v:adjKPI,l:'Sin Respaldo 📎',c:sinRespaldo>0?'--red':'--ok',ksub:adjSub},
    {v:withDesv.length?late.length:'-',l:'Entregados tarde',c:'--late',ksub:withDesv.length?`${pct(late.length,withDesv.length)}% de cerrados`:'Sin datos reales'},
    {v:withDesv.length?early.length:'-',l:'Anticipados',c:'--early',ksub:withDesv.length?`${pct(early.length,withDesv.length)}% de cerrados`:''},
    {v:avgDesv!==null?(avgDesv>0?'+'+avgDesv:''+avgDesv):'-',l:'Desv. Prom (días)',c:avgDesv>0?'--red':avgDesv<0?'--ok':'--accent',ksub:withDesv.length?`n=${withDesv.length}`:'Sin datos reales'},
    {v:avgDur!==null?avgDur+'d':'-',l:'Dur. Prom Planif.',c:'--ontime',ksub:withDur.length?`n=${withDur.length}`:''},
    {v:criticos.length,l:'Ruta Crítica',c:'--accent2',ksub:df.length?`${pct(criticos.length,df.length)}% del total`:''},
  ].map(k=>`<div class="kpi" style="--kclr:var(${k.c})"><div class="kv">${k.v}</div><div class="kl">${k.l}</div>${k.ksub?`<div class="ksub">${k.ksub}</div>`:''}</div>`).join('');
}

}

function buildDev(df){
  const withDesv=df.filter(r=>r._desv!==null);
  const n=withDesv.length;
  if(n===0)return`<div class="insight-box">Sin datos de <strong>Fin Real</strong> cargados. Asegúrate de tener una columna "Real" con la fecha real de cierre de cada actividad.</div>`;
  const late=withDesv.filter(r=>r._desv>0);
  const early=withDesv.filter(r=>r._desv<0);
  const ontime=withDesv.filter(r=>r._desv===0);
  const avgDesv=Math.round(withDesv.reduce((s,r)=>s+r._desv,0)/n);
  const maxLate=Math.max(...late.map(r=>r._desv));
  const maxEarly=Math.min(...early.map(r=>r._desv));
  // Tabla desviación por proyecto
  const projs=uq(withDesv.map(r=>r.Proyecto));
  const pRows=projs.map(p=>{const items=withDesv.filter(r=>r.Proyecto===p);const avg=Math.round(items.reduce((s,r)=>s+r._desv,0)/items.length);const lateN=items.filter(r=>r._desv>0).length;const earlyN=items.filter(r=>r._desv<0).length;return[p,items.length,lateN,earlyN,items.length-lateN-earlyN,avg,Math.max(...items.map(r=>r._desv)),Math.min(...items.map(r=>r._desv))];}).sort((a,b)=>b[5]-a[5]);
  return`<div class="stat-row">
    <div class="stat-card ${avgDesv>0?'red':'grn'}"><div class="sv">${avgDesv>0?'+':''}{${avgDesv}}d</div><div class="sl">Desviación promedio</div></div>
    <div class="stat-card red"><div class="sv">${late.length}</div><div class="sl">Entregados tarde (${pct(late.length,n)}%)</div></div>
    <div class="stat-card grn"><div class="sv">${early.length}</div><div class="sl">Anticipados (${pct(early.length,n)}%)</div></div>
    <div class="stat-card blu"><div class="sv">${ontime.length}</div><div class="sl">Puntuales (${pct(ontime.length,n)}%)</div></div>
    <div class="stat-card ylw"><div class="sv">${maxLate>0?'+'+maxLate+'d':'-'}</div><div class="sl">Mayor atraso</div></div>
    <div class="stat-card grn"><div class="sv">${maxEarly<0?maxEarly+'d':'-'}</div><div class="sl">Mayor adelanto</div></div>
  </div>
  <div class="dash-grid">
    <div class="dc c6"><h3><span class="dot" style="background:var(--accent)"></span>Distribución de Desviaciones (días)</h3><div class="cw h260"><canvas id="chDIST"></canvas></div></div>
    <div class="dc c6"><h3><span class="dot" style="background:var(--accent2)"></span>Desviación Promedio por Área</h3><div class="cw h260"><canvas id="chDAR"></canvas></div></div>
    <div class="dc c12"><h3><span class="dot" style="background:var(--warn)"></span>Ítems con Mayor Atraso (Top 15)</h3><div class="cw h300"><canvas id="chTOP"></canvas></div></div>
  </div>
  <div class="stitle">Desviación por Proyecto</div>
  ${mktbl('devproj',['Proyecto','n Cerrados','Tardíos','Anticipados','Puntuales','Desv.Prom(d)','Peor(d)','Mejor(d)'],pRows,null,{0:'left'},(v,ci)=>{if(ci===5)return v>0?'clate':v<0?'cearly':'contime';if(ci===6&&typeof v==='number'&&v>0)return 'clate rv';if(ci===7&&typeof v==='number'&&v<0)return 'cearly ok';return '';})}
  <div class="stitle">Detalle ítems cerrados con desviación</div>
  ${mktbl('devdet',['Proyecto','Etapa','Ítem','Área','Responsable','Fin Plan','Fin Real','Desviación','Dur.Plan(d)','Dur.Real(d)'],withDesv.sort((a,b)=>b._desv-a._desv).map(r=>[r.Proyecto,r.Etapa,r.Ítem,r.Área,r.Responsable,r._finP?r._finP.toLocaleDateString('es-CL'):'',r._finR?r._finR.toLocaleDateString('es-CL'):'',r._desvLabel,r._durPlan??'',r._durReal??'']),null,{0:'left',2:'left',4:'left',7:''},(v,ci,row)=>{if(ci===7){const lbl=String(v);return lbl.includes('tardío')?'clate':lbl.includes('anticipado')?'cearly':lbl==='0d (puntual)'?'contime':'';}return '';})}`.replace('${avgDesv}',Math.abs(avgDesv));
}

function initDevCharts(df){

  // chDIST histogram-like
  {const bins=[-60,-30,-14,-7,-3,0,3,7,14,30,60];const labels=['<-60','-60/-30','-30/-14','-14/-7','-7/-3','-3/0','0/3','3/7','7/14','14/30','30/60','>60'];const counts=new Array(labels.length).fill(0);withDesv.forEach(r=>{const d=r._desv;let bi=labels.length-1;for(let i=0;i<bins.length;i++){if(d<=bins[i]){bi=i;break;}}counts[bi]++;});const clrs=labels.map((_,i)=>i<=5?`rgba(34,197,94,${0.4+i*.06})`:`rgba(239,68,68,${0.35+(i-6)*.06})`);const el=document.getElementById('chDIST');if(!el)return;CI['chDIST']=new Chart(el,{type:'bar',data:{labels,datasets:[{data:counts,backgroundColor:clrs,borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>`Desviación: ${c[0].label} días`,label:c=>`${c.raw} ítems`}},datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'rgba(255,255,255,.85)',font:{weight:'700',size:9},formatter:v=>v,anchor:'end',align:'top',offset:2}},scales:{x:{grid:{display:false},ticks:{font:{size:8}}},y:{grid:{color:'rgba(255,255,255,.04)'},beginAtZero:true,ticks:{font:{size:9}}}}}});}

  // chTOP top tardíos
  {const top=withDesv.filter(r=>r._desv>0).sort((a,b)=>b._desv-a._desv).slice(0,15);const el=document.getElementById('chTOP');if(!el)return;CI['chTOP']=new Chart(el,{type:'bar',data:{labels:top.map(r=>(r.Ítem||r.Proyecto).slice(0,28)),datasets:[{label:'Días de atraso',data:top.map(r=>r._desv),backgroundColor:'rgba(239,68,68,.65)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},datalabels:{display:true,color:'rgba(255,255,255,.9)',font:{weight:'700',size:9},formatter:v=>'+'+v+'d',anchor:'end',align:'right',offset:3}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{font:{size:9}},title:{display:true,text:'días de atraso',font:{size:9}}},y:{grid:{display:false},ticks:{font:{size:8}}}}}});}

function buildStd(df){
  // Compare Plazo Estándar vs Duración Planificada vs Duración Real
  const withEst=df.filter(r=>r['Plazo Est']!==null);
  const withDur=df.filter(r=>r._durPlan!==null);
  // por Nombre Genérico (tipo de actividad)
  const tipoMap={};df.forEach(r=>{const t=r['Nombre Genérico']||r.Etapa||'Sin tipo';if(!tipoMap[t])tipoMap[t]={est:[],plan:[],real:[]};if(r['Plazo Est']!==null)tipoMap[t].est.push(r['Plazo Est']);if(r._durPlan!==null)tipoMap[t].plan.push(r._durPlan);if(r._durReal!==null)tipoMap[t].real.push(r._durReal);});
  const tipoRows=Object.entries(tipoMap).filter(([,v])=>v.plan.length>0||v.est.length>0).map(([tipo,v])=>{const avgEst=v.est.length?Math.round(v.est.reduce((a,b)=>a+b,0)/v.est.length):null;const avgPlan=v.plan.length?Math.round(v.plan.reduce((a,b)=>a+b,0)/v.plan.length):null;const avgReal=v.real.length?Math.round(v.real.reduce((a,b)=>a+b,0)/v.real.length):null;const brecha=avgPlan!==null&&avgEst!==null?avgPlan-avgEst:null;return[tipo,v.plan.length,avgEst??'-',avgPlan??'-',avgReal??'-',brecha!==null?(brecha>0?'+'+brecha:brecha):'',v.est.length,v.real.length];}).sort((a,b)=>(typeof b[3]==='number'?b[3]:0)-(typeof a[3]==='number'?a[3]:0));
  // por Etapa
  const etapaMap={};df.forEach(r=>{const e=r.Etapa;if(!etapaMap[e])etapaMap[e]={est:[],plan:[],real:[]};if(r['Plazo Est']!==null)etapaMap[e].est.push(r['Plazo Est']);if(r._durPlan!==null)etapaMap[e].plan.push(r._durPlan);if(r._durReal!==null)etapaMap[e].real.push(r._durReal);});
  const etapaRows=Object.entries(etapaMap).map(([e,v])=>{const avgEst=v.est.length?Math.round(v.est.reduce((a,b)=>a+b,0)/v.est.length):null;const avgPlan=v.plan.length?Math.round(v.plan.reduce((a,b)=>a+b,0)/v.plan.length):null;const avgReal=v.real.length?Math.round(v.real.reduce((a,b)=>a+b,0)/v.real.length):null;return[e,v.plan.length,avgEst??'-',avgPlan??'-',avgReal??'-',v.real.length];}).sort((a,b)=>(typeof b[3]==='number'?b[3]:0)-(typeof a[3]==='number'?a[3]:0));

  const hasStd=withEst.length>0;
  const stdNote=hasStd?`<span style="color:var(--ok)">✓ ${withEst.length} ítems con Plazo Estándar</span>`:`<span style="color:var(--text3)">Sin columna "Plazo Estándar" detectada — mostrando solo duración planificada vs real.</span>`;

  return`<div class="insight-box"><strong>📐 Análisis de Estándares de Plazo</strong> — Compara el plazo estándar definido contra la duración planificada y real de cada tipo de actividad.<br/><small style="margin-top:.3rem;display:block">${stdNote}</small></div>
  <div class="dash-grid">
    <div class="dc c6"><h3><span class="dot" style="background:var(--accent)"></span>Duración Promedio Planificada por Etapa (días)</h3><div class="cw h260"><canvas id="chEST1"></canvas></div></div>
    <div class="dc c6"><h3><span class="dot" style="background:var(--accent2)"></span>Plazo Est. vs Plan vs Real por Tipo (Top 10)</h3><div class="cw h260"><canvas id="chEST2"></canvas></div></div>
  </div>
  <div class="stitle">Estándares por Tipo de Actividad (Nombre Genérico)</div>
  ${mktbl('stdtipo',['Tipo Actividad','n Plan','Prom.Est(d)','Prom.Plan(d)','Prom.Real(d)','Brecha Est vs Plan','n Est','n Real'],tipoRows,null,{0:'left'},(v,ci)=>{if(ci===5){const s=String(v);return s.startsWith('+')?'clate':s.startsWith('-')?'cearly':'';} if(ci===4&&typeof v==='number')return '';return '';})}
  <div class="stitle">Duraciones Promedio por Etapa</div>
  ${mktbl('stdetapa',['Etapa','n Plan','Prom.Est(d)','Prom.Plan(d)','Prom.Real(d)','n Real'],etapaRows,null,{0:'left'},(v,ci)=>{if(ci===3&&typeof v==='number'&&v>60)return 'cwarn';return '';})}`;
}
